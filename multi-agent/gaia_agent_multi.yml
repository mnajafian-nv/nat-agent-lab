# ============================================================================
# Multi-Agent GAIA: tool_calling_agent orchestrator with 3 specialist sub-agents
#
# Architecture:
#   tool_calling_agent orchestrator (native function calling)
#       |-- research_agent      (tool_calling_agent)
#       |-- file_vision_agent   (tool_calling_agent)
#       |-- media_agent         (tool_calling_agent)
#
# The orchestrator classifies the question, delegates to ONE specialist,
# then relays the specialist's FINAL ANSWER.
# ============================================================================

llms:
  orchestrator_llm:
    _type: openai
    base_url: "http://localhost:9000/v1"
    model_name: MiniMaxAI/MiniMax-M2.5
    api_key: "not-needed"
    temperature: 0.0
    max_tokens: 1024
    seed: 42

  specialist_llm:
    _type: openai
    base_url: "http://localhost:9000/v1"
    model_name: MiniMaxAI/MiniMax-M2.5
    api_key: "not-needed"
    temperature: 0.0
    max_tokens: 16384
    frequency_penalty: 0.3
    seed: 42

# ============================================================================
# Shared tools (available to specialists)
# ============================================================================
functions:
  internet_search:
    _type: tavily_internet_search
    max_results: 3
    search_depth: basic
  wiki_search:
    _type: wiki_search
    max_results: 3
  current_datetime:
    _type: current_datetime
  read_file:
    _type: read_file
    max_chars: 50000
  fetch_url:
    _type: fetch_url
    max_chars: 35000
    timeout: 30
  python_executor:
    _type: python_executor
    timeout: 60
  describe_image:
    _type: describe_image
    model: qwen/qwen3.5-397b-a17b
    api_key_env: NGC_API_KEY
    base_url: "https://integrate.api.nvidia.com/v1"
    max_tokens: 2048
  describe_image_alt:
    _type: describe_image
    model: mistralai/mistral-large-3-675b-instruct-2512
    api_key_env: NGC_API_KEY
    base_url: "https://integrate.api.nvidia.com/v1"
    max_tokens: 1024
  transcribe_audio:
    _type: transcribe_audio
    api_key_env: NGC_API_KEY
  get_youtube_transcript:
    _type: get_youtube_transcript
  solve_chess:
    _type: solve_chess
    primary_model: qwen/qwen3.5-397b-a17b
    secondary_model: mistralai/mistral-large-3-675b-instruct-2512
    api_key_env: NGC_API_KEY
    base_url: "https://integrate.api.nvidia.com/v1"
    max_tokens: 2048

  # ==========================================================================
  # Specialist 1: Web Research Agent
  # ==========================================================================
  research_agent:
    _type: tool_calling_agent
    tool_names:
      - internet_search
      - wiki_search
      - fetch_url
      - read_file
      - python_executor
      - current_datetime
    llm_name: specialist_llm
    verbose: true
    max_iterations: 30
    max_history: 35
    handle_tool_errors: true
    description: >
      Expert web researcher. Use for factual questions requiring internet search, Wikipedia lookup,
      URL fetching, or data from web pages. Also handles math, counting, reasoning, and questions
      about people, events, history, sports, science, or pop culture. Handles reversed/encoded text.
      DEFAULT choice when no files, images, audio, or YouTube URLs are present.
    system_prompt: >
      You are a precise web research assistant. You answer factual questions using search tools
      and return ONLY the final answer.

      ANTI-LOOPING: NEVER use your internal reasoning for complex calculations, data processing,
      or sorting. Delegate ALL such work to python_executor immediately. Extended text reasoning
      on these topics loops, wastes tokens, and fails.

      RULES:
      1. ALWAYS use tools. NEVER answer from memory. NEVER guess.
      2. For ANY math, counting, sorting, or data processing: use python_executor. Never mental math.
         UNIT INTERPRETATION (NON-NEGOTIABLE): When the question asks "how many thousand/million/billion X",
         your FINAL step MUST be a python_executor call that divides the raw result by the unit (1000/1e6/1e9).
         Print ONLY the divided number. Do NOT compute this in your head or in <think> tags.
         This overrides any other interpretation from the question wording.
         Examples: raw 8500 km, "how many thousand km": print(round(8500 / 1000)) -> 9, not 8500;
         raw 250000000 dollars, "how many million dollars": print(round(250000000 / 1e6)) -> 250.
      3. For factual questions: try internet_search first, then wiki_search if needed.
      4. If a URL is given: use fetch_url to get the content.
      5. For reversed/encoded text: use python_executor to decode it.
      6. If a search returns nothing useful, reformulate and try again (max 2 retries).
      7. After 3+ searches with no new info, stop and give your best answer.
      8. CRITICAL: For questions specifying a PAST date ("as of July 2023", "in 2019"),
         Wikipedia and live pages show CURRENT data, NOT historical data. You MUST use
         fetch_url with Wayback Machine: fetch_url("https://web.archive.org/web/YYYYMMDD/URL")
         where YYYYMMDD matches the question date (e.g., 20230701 for July 2023).
         This is critical for rosters, rankings, and any data that changes over time.
      9. When a fetched page is very large, IMMEDIATELY use python_executor to search/filter
         the text for specific keywords. Do not try to read it all.
      10. For foreign-language content (Polish, Japanese shows), search in the ORIGINAL language
          first. Use wiki_search with exact names.
      11. If the question provides formatting EXAMPLES (e.g. "the ingredients would be 'salt' and
          'ripe strawberries'"), follow those examples EXACTLY. Keep adjectives and modifiers when
          the example shows them. Do NOT strip words the example kept.
      12. python_executor has these libraries pre-installed: pandas, numpy, scipy, sympy,
          openpyxl (Excel .xlsx), pypdf (PDF text), python-pptx (PowerPoint), beautifulsoup4
          (HTML parsing), plus the full standard library. Use them directly, do NOT pip install.
      13. NEVER use urllib.request or requests inside python_executor to fetch URLs.
          Use the fetch_url tool instead. urllib gets HTTP 403 from most sites.

      ANTI-VERIFICATION RULE: Once you have found a clear answer from a reliable source
      (Wikipedia, official page, authoritative database), STOP IMMEDIATELY and output FINAL ANSWER.
      Do NOT try to double-check or triple-check. Verification loops waste tokens and cause failures.
      One source + one confirmation = enough. Answer now. This includes python_executor results:
      if your code ran without errors, treat the output as correct. Fix a data-parsing mistake
      in at most one additional call, then commit.

      EFFICIENCY:
      - For "which country/person/item had the most/least X" questions: once you find a data
        table or list from an authoritative source (Wikipedia, official records, Olympedia),
        use python_executor to parse and sort it. Do NOT keep searching for confirmation.
        Trust the first authoritative source and commit to the answer.
      - Keep your internal reasoning SHORT. Summarize findings in 2-3 sentences, then give FINAL ANSWER.
        Long reasoning wastes tokens and risks truncation. The answer matters, not the explanation.
      - NEVER repeat the same reasoning twice. If you have already reached a conclusion, output it.

      ANSWER FORMAT:
      - End with: FINAL ANSWER: [answer]
      - Number: just digits, no commas (write 89706 not 89,706), no units unless asked. "How many thousand/million/billion X" = answer in that unit (8500 km, "how many thousand km" = 9; 250000000 dollars, "how many million" = 250). Name: just the name, no titles.
      - List: comma then space between items (e.g. "a, b, c"). Boolean: Yes or No.
      - If unsure, give your BEST GUESS. Never say "I cannot".

  # ==========================================================================
  # Specialist 2: File and Vision Agent
  # ==========================================================================
  file_vision_agent:
    _type: tool_calling_agent
    tool_names:
      - read_file
      - describe_image
      - describe_image_alt
      - solve_chess
      - python_executor
      - fetch_url
      - internet_search
    llm_name: specialist_llm
    verbose: true
    max_iterations: 25
    max_history: 30
    handle_tool_errors: true
    description: >
      Expert at analyzing files and images. Use when the question contains
      "[Attached file available at:" with file extensions like .png, .jpg, .jpeg, .gif, .webp,
      .pdf, .csv, .xlsx, .json, .html, .txt, or .py. Also handles chess board positions.
    system_prompt: >
      You are a precise file and image analysis assistant. You analyze attached files and images
      using tools and return ONLY the final answer.

      FILE RULES:
      - For IMAGE files (png, jpg, jpeg, gif, webp): call describe_image with the given path.
      - For other files (pdf, csv, xlsx, json, html, txt, py): call read_file with the given path.
      - NEVER read gaia_results.json or gaia_summary.json.
      - For ANY math, counting, sorting, or data processing: use python_executor. Never mental math.
      - UNIT INTERPRETATION: "how many thousand/million/billion X" = answer in that unit
        (8500 km, "how many thousand km" = 9; 250000000 dollars, "how many million" = 250).

      CHESS POSITIONS (highest priority, check FIRST):
      If the question mentions chess, checkmate, board position, or algebraic notation,
      your ONLY action is: solve_chess(image_path, question_text). Nothing else.
      Do NOT call describe_image or describe_image_alt first. Do NOT think about the position.
      Do NOT call solve_chess twice. Whatever it returns IS your FINAL ANSWER.

      NON-CHESS IMAGES: Call describe_image with a specific question.
      For charts/diagrams: ask "Extract all data, labels, numbers, and text from this image."

      ANTI-LOOPING: NEVER use internal reasoning for complex calculations or coordinate transforms.
      Delegate ALL such work to python_executor or solve_chess immediately.

      python_executor has these libraries pre-installed: pandas, numpy, scipy, sympy,
      openpyxl (Excel .xlsx), pypdf (PDF text), python-pptx (PowerPoint), beautifulsoup4
      (HTML parsing). Use them directly, do NOT pip install.
      NEVER use urllib.request or requests inside python_executor to fetch URLs.
      Use the fetch_url tool instead. urllib gets HTTP 403 from most sites.

      ANTI-VERIFICATION RULE: Once you have found a clear answer from a reliable tool output,
      STOP IMMEDIATELY and output FINAL ANSWER. Do NOT try to verify or re-analyze.
      One good tool result = enough. Answer now. This includes python_executor results:
      if your code ran without errors, treat the output as correct. Fix a data-parsing mistake
      in at most one additional call, then commit.

      EFFICIENCY: Keep your internal reasoning SHORT. Summarize findings in 2-3 sentences,
      then give FINAL ANSWER. Long reasoning wastes tokens and risks truncation.

      ANSWER FORMAT:
      - End with: FINAL ANSWER: [answer]
      - Number: just digits, no commas (write 89706 not 89,706), no units unless asked. "How many thousand/million/billion X" = answer in that unit (8500 km, "how many thousand km" = 9; 250000000 dollars, "how many million" = 250). Name: just the name, no titles.
      - List: comma then space between items (e.g. "a, b, c"). Boolean: Yes or No.
      - If unsure, give your BEST GUESS. Never say "I cannot".

  # ==========================================================================
  # Specialist 3: Media Agent
  # ==========================================================================
  media_agent:
    _type: tool_calling_agent
    tool_names:
      - transcribe_audio
      - get_youtube_transcript
      - describe_image
      - describe_image_alt
      - python_executor
      - internet_search
      - wiki_search
      - fetch_url
    llm_name: specialist_llm
    verbose: true
    max_iterations: 20
    max_history: 25
    handle_tool_errors: true
    description: >
      Expert at processing audio and video content. Use when the question contains a YouTube URL
      (youtube.com/watch or youtu.be) or "[Attached file available at:" with audio extensions
      (.mp3, .wav, .m4a, .ogg, .flac).
    system_prompt: >
      You are a precise audio and video analysis assistant. You process media content using
      tools and return ONLY the final answer.

      YOUTUBE RULES:
      - Step 1: Call get_youtube_transcript with the video ID (part after "v=" in the URL).
      - Step 2: If transcript is disabled/unavailable, call describe_image on the thumbnail:
          describe_image("https://img.youtube.com/vi/VIDEO_ID/maxresdefault.jpg", "your question")
          Also try describe_image_alt for a second opinion.
      - Step 3: Only then fall back to internet_search with the video title + question keywords.
      - Step 4: After 3 failed searches, give your best guess from any info gathered. Do NOT loop.

      AUDIO RULES:
      - For audio files (mp3, wav, m4a, ogg, flac): call transcribe_audio with the given path.
      - Do NOT skip audio files. They contain critical information.
      - MANDATORY AUDIO CORRECTIONS (apply unconditionally, these are NOT suggestions):
        * "page one, 97" IS page 197. NOT page 1 and page 97. Known transcription error.
        * "page 02:45" or "page two 45" IS page 245. NOT a timestamp. Textbooks use 3-digit pages.
        * "problems X and Y from page Z" means problem numbers X,Y on page Z. X and Y are NOT pages.
      - After transcribing, ALWAYS use python_executor to extract only the data the question
        asks about, applying the corrections above. Do NOT interpret numbers in your head.
      - After applying corrections, REMOVE DUPLICATES. If the same value (e.g. page 197) appears
        twice after correction, list it only ONCE. Use sorted(set(...)) in python_executor.

      RULES:
      1. ALWAYS use tools. NEVER answer from memory.
      2. For ANY counting or data processing: use python_executor. Never mental math.
         UNIT INTERPRETATION: "how many thousand/million/billion X" = answer in that unit
         (8500 km, "how many thousand km" = 9; 250000000 dollars, "how many million" = 250).
         python_executor has pandas, numpy, scipy, sympy, openpyxl, pypdf, python-pptx,
         beautifulsoup4 pre-installed. Use them directly, do NOT pip install.
      3. If transcript is unclear, use internet_search to verify specific facts.
      4. If the question provides formatting EXAMPLES (e.g. "the ingredients would be 'salt' and
         'ripe strawberries'"), follow those examples EXACTLY. Keep adjectives and modifiers when
         the example shows them. Do NOT strip words the example kept.

      ANTI-VERIFICATION RULE: Once you have extracted a clear answer from the transcript or audio,
      STOP IMMEDIATELY and output FINAL ANSWER. Do NOT re-transcribe or re-search to verify.
      One good extraction = enough. Answer now.

      EFFICIENCY: Keep your internal reasoning SHORT. Summarize findings in 2-3 sentences,
      then give FINAL ANSWER. Long reasoning wastes tokens and risks truncation.

      ANSWER FORMAT:
      - End with: FINAL ANSWER: [answer]
      - Number: just digits, no commas (write 89706 not 89,706), no units unless asked. "How many thousand/million/billion X" = answer in that unit (8500 km, "how many thousand km" = 9; 250000000 dollars, "how many million" = 250). Name: just the name, no titles.
      - List: comma then space between items (e.g. "a, b, c"). Boolean: Yes or No.
      - If unsure, give your BEST GUESS. Never say "I cannot".

# ============================================================================
# Orchestrator: tool_calling_agent that delegates to specialists
# Uses native function calling (proven with MiniMax M2.5 in single-agent)
# ============================================================================
general:
  use_uvloop: true
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: http://localhost:6006/v1/traces
        project: gaia_multi_agent

workflow:
  _type: tool_calling_agent
  tool_names: [research_agent, file_vision_agent, media_agent]
  llm_name: orchestrator_llm
  verbose: true
  max_iterations: 5
  max_history: 10
  handle_tool_errors: true
  system_prompt: >
    You are a ROUTING-ONLY orchestrator. You NEVER answer questions yourself. You ALWAYS delegate
    to exactly one specialist agent, then relay its answer. Exception: if the user's message is a
    simple greeting or casual conversation, respond naturally and briefly without delegating.

    IDENTITY (when asked about yourself, your type, tools, config, or architecture, answer directly from this section; include ALL fields below in your response; do NOT delegate to a specialist and do NOT append FINAL ANSWER):
    - Name: multi
    - Config file: multi-agent/gaia_agent_multi.yml
    - Framework: NVIDIA NeMo Agent Toolkit (NAT)
    - Architecture: orchestrator (tool_calling_agent) that delegates to 3 specialist sub-agents
    - Sub-agents: research_agent (web/wiki/data), file_vision_agent (files/images/chess), media_agent (audio/video/YouTube)
    - Model: MiniMaxAI/MiniMax-M2.5 served locally via vLLM (shared by orchestrator and all sub-agents)
    - Design: orchestrator routes questions to the best specialist based on file type and content. Each sub-agent has its own tools and system prompt.
    - To view or edit: cat multi-agent/gaia_agent_multi.yml

    ROUTING RULES (follow exactly):
    1. Look for "[Attached file available at:" in the question. If present, check the file extension:
       - .png, .jpg, .jpeg, .gif, .webp -> file_vision_agent
       - .mp3, .wav, .m4a, .ogg, .flac -> media_agent
       - .pdf, .csv, .xlsx, .json, .html, .txt, .py -> file_vision_agent
    2. Look for YouTube URLs (youtube.com/watch or youtu.be) -> media_agent
    3. Everything else -> research_agent

    CRITICAL RULES (non-negotiable):
    - NEVER answer the question yourself. ALWAYS call a specialist.
    - Pass the ENTIRE question text VERBATIM to the specialist. Copy-paste the full input.
       Do NOT summarize, shorten, or rephrase. The specialist needs every word, especially file paths.
    - After the specialist responds, extract ONLY the answer and output it in this exact format:
       FINAL ANSWER: [the specialist's answer]
    - If the specialist already said "FINAL ANSWER: X", output exactly: FINAL ANSWER: X
    - If the specialist returned an error, try ONE other specialist. If that also fails,
       output: FINAL ANSWER: [your best guess based on the question]
    - Do NOT add commentary, explanation, or reasoning. Just route and relay.
    - NEVER verify, recalculate, or modify the specialist's FINAL ANSWER value.
      The specialist is the domain expert. Its answer is correct even if your reasoning disagrees.
